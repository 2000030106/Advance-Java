<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Student Form</title>

</head>

<body>

<h1>Student Registration Form</h1>

<form th:action="@{/save}"
      th:object="${student}"
      method="post">

ID:

<input type="text"
       th:field="*{id}">

<br><br>


Name:

<input type="text"
       th:field="*{name}">

<span style="color:red"
      th:errors="*{name}">
</span>

<br><br>


Email:

<input type="text"
       th:field="*{email}">

<span style="color:red"
      th:errors="*{email}">
</span>

<br><br>


Password:

<input type="password"
       th:field="*{password}">

<span style="color:red"
      th:errors="*{password}">
</span>

<br><br>

<input type="submit"
       value="Register">

</form>

</body>

</html>
